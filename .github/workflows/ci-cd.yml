deploy:
  if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
  needs: build-test-package
  runs-on: ubuntu-latest

  steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deploy-package

    - name: Configure AWS credentials with OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::412541033791:role/GitHubActionsElasticBeanstalkRole
        aws-region: eu-central-1

    - name: Deploy to Elastic Beanstalk
      uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
      with:
        application-name: springboot-aws-docker-demo
        environment-name: springboot-aws-docker-demo-env
        version-label: ${{ needs.build-test-package.outputs.version_label }}
        aws-region: eu-central-1
        deployment-package-path: deploy.zip
        create-application-if-not-exists: true
        create-environment-if-not-exists: true
        platform-arn: arn:aws:elasticbeanstalk:eu-central-1::platform/Docker running on 64bit Amazon Linux 2023
        option-settings: |
          [
            {
              "Namespace": "aws:autoscaling:launchconfiguration",
              "OptionName": "IamInstanceProfile",
              "Value": "aws-elasticbeanstalk-ec2-role"
            },
            {
              "Namespace": "aws:elasticbeanstalk:environment",
              "OptionName": "ServiceRole",
              "Value": "aws-elasticbeanstalk-service-role"
            }
          ]